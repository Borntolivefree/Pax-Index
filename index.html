<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax-Index: Soberania</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --gold: #f1c40f; --green: #2ecc71; --grey: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wallet { width: 100%; max-width: 400px; background: var(--grey); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); display: flex; justify-content: space-between; margin-bottom: 20px; box-sizing: border-box; }
        #banana-icon { font-size: 80px; margin: 20px 0; opacity: 0.2; transition: 0.5s; }
        .glow-green { filter: drop-shadow(0 0 20px var(--green)); opacity: 1 !important; }
        #reader { width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; display: block; text-align: center; text-decoration: none; }
        .btn-gold { background: var(--gold); color: black; }
        #history { width: 100%; max-width: 400px; margin-top: 30px; text-align: left; }
        .h-item { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div class="wallet">
        <span style="font-size: 14px; color: #888;">MINHA CARTEIRA PAX</span>
        <b style="color: var(--gold); font-size: 1.2rem;">2.00€</b>
    </div>

    <div id="banana-icon">🍌</div>
    <div id="reader"></div>

    <button class="btn btn-gold" onclick="startScanner()">LIGAR SCANNER DE FATURA</button>
    
    <label class="btn" style="background: #222; color: #fff;">
        📷 CARREGAR FOTO DO RECIBO
        <input type="file" accept="image/*" style="display: none;" onchange="readImage(this)">
    </label>

    <div id="res" style="display:none; width:100%; max-width:400px; background:#111; padding:20px; border-radius:15px; margin-top:20px;">
        <h3 id="coName" style="margin:0">---</h3>
        <p id="coType" style="color:var(--green); font-weight:bold; margin:10px 0;"></p>
        <button class="btn btn-gold" onclick="confirmAudit()">REIVINDICAR CASHBACK</button>
    </div>

    <div id="history">
        <h4 style="color:var(--gold)">HISTÓRICO RECENTE</h4>
        <div id="list"></div>
    </div>

    <script>
        function startScanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (txt) => { processData(txt); scanner.stop(); })
            .catch(() => alert("Aceda via HTTPS para ligar a câmara."));
        }

        async function readImage(input) {
            if (!input.files[0]) return;
            const { data: { text } } = await Tesseract.recognize(input.files[0], 'por');
            processData(text);
        }

        function processData(data) {
            const isPme = data.includes("Unipessoal") || data.includes("Lda");
            document.getElementById('res').style.display = "block";
            document.getElementById('coName').innerText = isPme ? "Empresa Soberana" : "Empresa em Auditoria";
            document.getElementById('coType').innerText = "+0.50€ Cashback";
            document.getElementById('banana-icon').className = "glow-green";
        }

        function confirmAudit() {
            const list = document.getElementById('list');
            const item = document.createElement('div');
            item.className = 'h-item';
            item.innerHTML = `<span>Auditoria Efetuada</span><b>+0.50€</b>`;
            list.prepend(item);
            document.getElementById('res').style.display = "none";
            alert("Saldo adicionado à Carteira Pax!");
        }
    </script>
</body>
</html>
